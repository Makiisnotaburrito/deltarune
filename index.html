<script>
        let gamestarted = false;

        function loadChapter(chapter) {
            const mainArea = document.getElementById('main-menu');
            const saveUI = document.getElementById('save-ui');
            
            // Look for the specific folder for each chapter
            fetch(`chapter${chapter}/index.html`)
                .then(res => {
                    if (!res.ok) throw new Error("Chapter file not found");
                    return res.text();
                })
                .then(html => {
                    gamestarted = true;
                    
                    // 1. Hide the main menu
                    if(mainArea) mainArea.style.display = 'none';
                    
                    // 2. Create a container for the game content
                    const gameContainer = document.createElement('div');
                    gameContainer.id = 'game-runtime';
                    gameContainer.innerHTML = html;
                    document.body.appendChild(gameContainer);

                    // 3. Show the Save UI
                    if(saveUI) saveUI.style.display = 'flex';
                })
                .catch(err => {
                    console.error(err);
                    alert("Error loading Chapter " + chapter + ". Check if the folder exists!");
                });
        }
        
        // Use a simple string for the alert to avoid "undefined"
        function showSaveMessage() {
            alert("Save functionality coming soon!");
        }
    </script>
