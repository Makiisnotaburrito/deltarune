<script>
    const audio = document.getElementById('drone');
    const mute = document.getElementById('mute');
    let gamestarted = false;

    // Standard mute toggle logic
    mute.addEventListener('click', () => {
        if (!gamestarted) {
            audio.muted = !audio.muted;
            mute.textContent = audio.muted ? '🔊' : '🔇';
        }
    });

    function loadChapter(chapter) {
        gamestarted = true;
        
        // Stop the menu music
        audio.pause();

        // Create the game frame
        const iframe = document.createElement('iframe');
        
        // IMPORTANT: We use a relative path so it works on your PC and Phone
        iframe.src = `chapter${chapter}/index.html`;
        
        // Styling to make it fullscreen and clean
        iframe.style.position = 'fixed';
        iframe.style.top = '0';
        iframe.style.left = '0';
        iframe.style.width = '100vw';
        iframe.style.height = '100vh';
        iframe.style.border = 'none';
        iframe.style.backgroundColor = 'black';
        iframe.style.zIndex = '9999';
        
        // Clear the menu and launch
        document.body.innerHTML = ''; 
        document.body.appendChild(iframe);
        
        console.log(`Launching Chapter ${chapter} in isolated frame...`);
    }

    // Keyboard navigation logic
    let selectedChapter = null;
    document.addEventListener('keydown', function(event) {
        if (!gamestarted) {
            const rows = document.querySelectorAll('.row');
            if (event.key === 'ArrowUp') {
                if (selectedChapter === null || selectedChapter <= 0) selectedChapter = rows.length - 1;
                else selectedChapter--;
                updateSelection(rows);
            } else if (event.key === 'ArrowDown') {
                if (selectedChapter === null || selectedChapter >= rows.length - 1) selectedChapter = 0;
                else selectedChapter++;
                updateSelection(rows);
            } else if (event.key === 'Enter' && selectedChapter !== null) {
                loadChapter(selectedChapter + 1);
            }
        }
    });

    function updateSelection(rows) {
        rows.forEach((row, i) => {
            row.classList.toggle('selected', i === selectedChapter);
        });
        new Audio('audios/snd_menumove.mp3').play();
    }
</script>
