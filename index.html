<body>
  <div class="logo-container">
    <img src="logo.png" alt="Logo" class="logo">
  </div>
  
  <div class="menu">
    <a href="javascript:loadChapter(1)" class="row">
      <span class="chapter">Chapter 1</span>

    <a href="javascript:loadChapter(2)" class="row">
      <span class="chapter">Chapter 2</span>

      <img src="icons/2.png">
    </a>
    <a href="javascript:loadChapter(3)" class="row">
      <span class="chapter">Chapter 3</span>
      <span class="title">Late Night</span>
      <img src="icons/3.png">
    </a>
    <a href="javascript:loadChapter(4)" class="row">
      <span class="chapter">Chapter 4</span>
      <span class="title">Prophecy</span>
      <img src="icons/4.png">
    </a>
    <a href="javascript:alert('Chapter 5 coming soon!')" class="disabled-row">
      <span class="chapter">Chapter 5</span>
      <span class="disabled-title">--</span>
      <img src="icons/0.png">
    </a>
    <a href="javascript:alert('Chapter 6 coming soon!')" class="disabled-row">
      <span class="chapter">Chapter 6</span>
      <span class="disabled-title">--</span>
      <img src="icons/0.png">
    </a>
    <a href="javascript:alert('Chapter 7 coming soon!')" class="disabled-row">
      <span class="chapter">Chapter 7</span>
      <span class="disabled-title">--</span>
      <img src="icons/0.png">
    </a>
    <a href="javascript:window.open('https://truffled.lol', '_blank')" class="row">
      <span class="chapter"></span>
      <span class="title">port by bog :o</span>
      <span class="badge"></span>
    </a>
  </div>

  <audio id="drone" controls loop autoplay hidden>
    <source src="audios/AUDIO_DRONE.ogg" type="audio/ogg">
  </audio>
  <button id="mute">🔊</button>

  <script>
    const audio = document.getElementById('drone');
    const mute = document.getElementById('mute');
    let gamestarted = false;
    let selectedChapter = null;

    const menumoveaudio = new Audio('audios/snd_menumove.mp3');
    const menuselectaudio = new Audio('audios/snd_select.mp3');

    mute.addEventListener('click', () => {
      if (!gamestarted) {
        audio.muted = !audio.muted;
        updateButton(); 
      }
    });
  
    function updateButton() {
      mute.textContent = audio.muted ? '🔇' : '🔊';
    }

    async function loadChapter(chapter) {
      if (!gamestarted) menuselectaudio.play();

      const saveData = "TUFLSQ0KTk9OQlVSUklUTw0KDQoNCg0KDQoNCjENCjINCjMNCjExNjYNCjAgDQoxIA0KLTgzNSANCjEgDQoxDQoxIA0KMCANCjEwIA0KMiANCjAgDQowIA0KMCANCjAgDQowIA0KbmFuIA0KMCANCjAgDQowIA0KMCANCjAgDQowIA0KMCANCjAgDQowIA0KMCANCjAgDQowIA0KMCANCjAgDQowIA0KMCANCjAgDQowIA0KMCANCjAgDQowIA0KMCANCjAgDQowIA0KMCANCjAgDQowIA0KMCANCjAgDQowIA0KMCANCjAgDQowIA0KMCANCjAgDQowIA0KOTAgDQo5MCANCjEwIA0KOTk5IA0KMCANCjAgDQo1IA0KNSANCjEgDQpuYW4gDQoyIA0KMCANCjAgDQoxIA0KMCANCjAgDQowIA0KMCANCjAgDQoyIA0KMCANCjAgDQowIA0KMCANCjAgDQowIA0KMCANCjEgDQowIA0KMCANCjAgDQowIA0KMCANCjAgDQowIA0KMCANCjAgDQowIA0KMCANCjAgDQowIA0KMCANCjcNCjANCjANCjANCjANCjANCjAgDQowIA0KMCANCjAgDQowIA0KMCANCjExMA";

      const injectSave = () => {
        const request = indexedDB.open("/idbfs", 21);
        request.onsuccess = function(event) {
          const db = event.target.result;
          if (db.objectStoreNames.contains("FILE_DATA")) {
            const transaction = db.transaction(["FILE_DATA"], "readwrite");
            const store = transaction.objectStore("FILE_DATA");
            
            const binaryStr = atob(saveData);
            const bytes = new Uint8Array(binaryStr.length);
            for (let i = 0; i < binaryStr.length; i++) {
              bytes[i] = binaryStr.charCodeAt(i);
            }

            // Put the data and use the 'oncomplete' to ensure it's written
            store.put({ contents: bytes.buffer, timestamp: Date.now(), mode: 33206 }, "/filech1_1");
            
            transaction.oncomplete = () => {
                console.log("Database Sync Complete. Save is live.");
                clearInterval(injectionInterval);
            };
          }
        };
      };

      const injectionInterval = setInterval(injectSave, 1000);

      const res = await fetch(`chapter${chapter}/index.html`);
      const html = await res.text();
      
      gamestarted = true;
      if (audio) audio.pause();
      document.documentElement.innerHTML = html;

      // Start scripts with a slight delay to allow IDB to initialize
      setTimeout(() => {
          document.querySelectorAll('script').forEach(oldScript => {
            const newScript = document.createElement('script');
            if (oldScript.src) {
              newScript.src = oldScript.src;
            } else {
              newScript.textContent = oldScript.textContent;
            }
            document.body.appendChild(newScript);
          });
      }, 100);
    }

    document.addEventListener('keydown', function(event) {
      if (!gamestarted) {
        const rows = document.querySelectorAll('.row, .disabled-row');
        if (event.key === 'ArrowUp') {
          if (selectedChapter === null) selectedChapter = 0;
          else {
            rows[selectedChapter].classList.remove("selected");
            selectedChapter = (selectedChapter - 1 + rows.length) % rows.length;
          }
          rows[selectedChapter].classList.add("selected");
          menumoveaudio.play();
        } else if (event.key === 'ArrowDown') {
          if (selectedChapter === null) selectedChapter = 0;
          else {
            rows[selectedChapter].classList.remove("selected");
            selectedChapter = (selectedChapter + 1) % rows.length;
          }
          rows[selectedChapter].classList.add("selected");
          menumoveaudio.play();
        } else if (event.key === 'Enter' && selectedChapter !== null) {
          const target = rows[selectedChapter];
          if (target.href.includes('javascript:loadChapter')) {
            loadChapter(selectedChapter + 1);
          } else {
            eval(target.href.replace('javascript:', ''));
          }
        }
      }
    });

    document.querySelectorAll('.row, .disabled-row').forEach((row, index) => {
      row.addEventListener('mouseenter', () => {
        if (!gamestarted) {
          if (selectedChapter !== null) document.querySelectorAll('.row, .disabled-row')[selectedChapter].classList.remove("selected");
          selectedChapter = index;
          row.classList.add("selected");
          menumoveaudio.play();
        }
      });
    });
  </script>
</body>
</html>
