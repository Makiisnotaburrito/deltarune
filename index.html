<!DOCTYPE html>
<html>
<head>
  <base href="https://cdn.jsdelivr.net/gh/technonyte00/deltarune@main/">
  <meta charset="UTF-8">
  <link rel="stylesheet" href="style.css">
  <style>
    /* Styling to match your existing menu */
    .save-management {
      margin-top: 20px;
      display: flex;
      justify-content: center;
      gap: 10px;
    }
    .save-btn {
      background: black;
      color: white;
      border: 2px solid white;
      padding: 10px 20px;
      font-family: inherit;
      cursor: pointer;
      text-transform: uppercase;
      transition: 0.2s;
    }
    .save-btn:hover {
      background: white;
      color: black;
    }
  </style>
</head>
<body>
  <div class="logo-container">
    <img src="logo.png" alt="Logo" class="logo">
  </div>
  
  <div class="menu">
    <a href="javascript:loadChapter(1)" class="row">
      <span class="chapter">Chapter 1</span>
      <span class="title">The Beginning</span>
      <img src="icons/1.png">
    </a>
    <a href="javascript:loadChapter(2)" class="row">
      <span class="chapter">Chapter 2</span>
      <span class="title">A Cyber's World</span>
      <img src="icons/2.png">
    </a>
    <a href="javascript:loadChapter(3)" class="row">
      <span class="chapter">Chapter 3</span>
      <span class="title">Late Night</span>
      <img src="icons/3.png">
    </a>
    <a href="javascript:loadChapter(4)" class="row">
      <span class="chapter">Chapter 4</span>
      <span class="title">Prophecy</span>
      <img src="icons/4.png">
    </a>
    
    <!-- Save Management Section -->
    <div class="save-management">
      <button class="save-btn" onclick="exportSave()">Export Save</button>
      <button class="save-btn" onclick="importSave()">Import Save</button>
    </div>

    <a href="javascript:alert('Chapter 5 coming soon!')" class="disabled-row">
      <span class="chapter">Chapter 5</span>
      <span class="disabled-title">--</span>
      <img src="icons/0.png">
    </a>
    <a href="javascript:alert('Chapter 6 coming soon!')" class="disabled-row">
      <span class="chapter">Chapter 6</span>
      <span class="disabled-title">--</span>
      <img src="icons/0.png">
    </a>
    <a href="javascript:alert('Chapter 7 coming soon!')" class="disabled-row">
      <span class="chapter">Chapter 7</span>
      <span class="disabled-title">--</span>
      <img src="icons/0.png">
    </a>
    <a href="javascript:window.open('https://truffled.lol', '_blank')" class="row">
      <span class="chapter"></span>
      <span class="title">port by bog :o</span>
      <span class="badge"></span>
    </a>
  </div>

  <audio id="drone" controls loop autoplay hidden>
    <source src="audios/AUDIO_DRONE.ogg" type="audio/ogg">
    your browser doesn't support AUDIO.
  </audio>
  <button id="mute">🔊</button>

  <script>
    const audio = document.getElementById('drone');
    const mute = document.getElementById('mute');
    let gamestarted = false;
  
    mute.addEventListener('click', () => {
      if (!gamestarted) {
        audio.muted = !audio.muted;
        updateButton(); 
      }
    });
  
    function updateButton() {
      if (!gamestarted) {
        mute.textContent = audio.muted ? '🔊' : '🔇';
      }
    }
  
    updateButton();

    function loadChapter(chapter) {
      fetch(`chapter${chapter}/index.html`).then(res => res.text()).then(html => {
        gamestarted = true;
        document.documentElement.innerHTML = html;
        document.documentElement.querySelectorAll('script').forEach(oldScript => {
          const newScript = document.createElement('script');
          if (oldScript.src) {
            newScript.src = oldScript.src;
          } else {
            newScript.textContent = oldScript.textContent;
          }
          document.body.appendChild(newScript);
        });
      });
    }

    // SAVE MANAGEMENT LOGIC
    function exportSave() {
      const request = indexedDB.open("/_savedata");
      request.onsuccess = (event) => {
        const db = event.target.result;
        try {
          const transaction = db.transaction(["FILE_DATA"], "readonly");
          const objectStore = transaction.objectStore("FILE_DATA");
          const getRequest = objectStore.get("/filech1_0");

          getRequest.onsuccess = () => {
            if (getRequest.result) {
              const blob = new Blob([getRequest.result.contents], {type: "application/octet-stream"});
              const url = URL.createObjectURL(blob);
              const a = document.createElement("a");
              a.href = url;
              a.download = "filech1_0";
              a.click();
            } else {
              alert("No save file found. Start the game and save first.");
            }
          };
        } catch (e) {
          alert("Error: Database structure mismatch or save not found.");
        }
      };
    }

    function importSave() {
      const input = document.createElement('input');
      input.type = 'file';
      input.onchange = e => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.readAsArrayBuffer(file);
        reader.onload = readerEvent => {
          const content = readerEvent.target.result;
          const request = indexedDB.open("/_savedata");
          request.onsuccess = (event) => {
            const db = event.target.result;
            const transaction = db.transaction(["FILE_DATA"], "readwrite");
            const objectStore = transaction.objectStore("FILE_DATA");
            objectStore.put({ contents: new Uint8Array(content), timestamp: Date.now() }, "/filech1_0");
            alert("Save Imported! You can now launch Chapter 1.");
          };
        };
      };
      input.click();
    }

    const menumoveaudio = new Audio('audios/snd_menumove.mp3');
    const menuselectaudio = new Audio('audios/snd_select.mp3');
    document.querySelectorAll('.row').forEach(row => {
      row.addEventListener('mouseenter', () => {
        if (!gamestarted) {
          menumoveaudio.play();
          if (selectedChapter !== null) {
            document.querySelectorAll('.row')[selectedChapter].classList.remove("selected");
          }
        }
      });
      row.addEventListener('click', () => {
        if (!gamestarted) {
          menuselectaudio.play();
        }
      });
    });

    let selectedChapter = null;
    document.addEventListener('keydown', function(event) {
      if (!gamestarted) {
        if (event.key === 'ArrowUp') {
          if (selectedChapter === null) {
            selectedChapter = 0;
          } else {
            document.querySelectorAll('.row')[selectedChapter].classList.remove("selected");
            selectedChapter = (selectedChapter - 1 + document.querySelectorAll('.row').length) % document.querySelectorAll('.row').length;
          }
          document.querySelectorAll('.row')[selectedChapter].classList.add("selected");
          menumoveaudio.play();
        } else if (event.key === 'ArrowDown') {
          if (selectedChapter === null) {
            selectedChapter = 0;
          } else {
            document.querySelectorAll('.row')[selectedChapter].classList.remove("selected");
            selectedChapter = (selectedChapter + 1) % document.querySelectorAll('.row').length;
          }
          document.querySelectorAll('.row')[selectedChapter].classList.add("selected");
          menumoveaudio.play();
        } else if (event.key === 'Enter' && selectedChapter !== null) {
          menuselectaudio.play();
          loadChapter(selectedChapter + 1);
        }
      }
    });
  </script>
</body>
</html>
